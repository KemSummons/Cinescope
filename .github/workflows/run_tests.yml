name: Automated tests with Allure Report

on:
  workflow_dispatch:
    inputs:
      deployment_target:
        description: 'Выберите тип тестов'
        required: true
        default: 'api_tests'
        type: choice
        options:
          - api_tests
          - ui_tests

jobs:
  test:
    runs-on: ubuntu-latest

    # Использование секретов в переменных окружения
    env:
      DB_MOVIES_NAME: ${{ secrets.DB_MOVIES_NAME }}
      DB_MOVIES_USERNAME: ${{ secrets.DB_MOVIES_USERNAME }}
      DB_MOVIES_PASSWORD: ${{ secrets.DB_MOVIES_PASSWORD }}
      DB_MOVIES_HOST: ${{ secrets.DB_MOVIES_HOST }}
      DB_MOVIES_PORT: ${{ secrets.DB_MOVIES_PORT }}
      SUPER_ADMIN_USERNAME: ${{ secrets.SUPER_ADMIN_USERNAME }}
      SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Этот шаг выполнится только если в выборе указано ui_tests
      - name: Install Playwright Browsers
        if: ${{ github.event.inputs.deployment_target == 'ui_tests' }}
        run: |
          playwright install --with-deps

      - name: api_tests
        if: ${{ github.event.inputs.deployment_target == 'api_tests'}}
        run: |
          pytest -m "not ui and not db" --alluredir=allure-results

      - name: ui_tests
        if: ${{github.event.inputs.deployment_target == 'ui_tests' }}
        run: |
          pytest -m "ui" --alluredir=allure-results

      - name: Install Allure Commandline
        run: |
          curl -L -o allure-commandline.zip https://repo1.maven.org/maven2/io/qameta/allure/allure-commandline/2.20.1/allure-commandline-2.20.1.zip
          unzip -q allure-commandline.zip
          echo "$GITHUB_WORKSPACE/allure-2.20.1/bin" >> $GITHUB_PATH

      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
      
